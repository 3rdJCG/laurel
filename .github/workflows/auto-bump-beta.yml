name: Auto Bump Beta Version

on:
  push:
    branches:
      - master

jobs:
  auto-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump develop to next beta after stable release
        run: |
          # masterの安定版バージョンを取得
          git fetch origin master
          STABLE_VERSION=$(git show origin/master:package.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');process.stdout.write(JSON.parse(d).version)")
          echo "Stable version on master: $STABLE_VERSION"

          # stable形式かチェック
          if ! echo "$STABLE_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Not a stable version, skipping bump"
            exit 0
          fi

          MAJOR=$(echo $STABLE_VERSION | cut -d. -f1)
          MINOR=$(echo $STABLE_VERSION | cut -d. -f2)
          PATCH=$(echo $STABLE_VERSION | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-beta.1"

          echo "Bumping develop to $NEW_VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "🔧 chore: auto bump to $NEW_VERSION [skip ci]"
          git push origin develop
