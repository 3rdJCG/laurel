name: Version Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Version must be stable (x.y.z) on master
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "Version: $VERSION"

          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "✅ '$VERSION' is a valid stable version"
          else
            echo "❌ '$VERSION' is not a stable version"
            echo "   Remove the pre-release suffix (e.g. -beta.N) before merging to master"
            exit 1
          fi
